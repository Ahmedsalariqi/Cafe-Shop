<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mines Radar — محاكي</title>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", "Helvetica Neue", Arial; background:#0f1720; color:#dbeafe; display:flex; gap:20px; padding:24px; min-height:100vh; align-items:flex-start; }
  .panel { background:#0b1220; padding:18px; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.6); }
  h1 { margin:0 0 12px 0; font-size:18px; color:#86efac }
  .controls { display:flex; flex-direction:column; gap:8px; width:300px; }
  .grid { display:grid; gap:6px; margin-top:6px; background:transparent; }
  .cell { width:56px; height:56px; display:flex; align-items:center; justify-content:center; border-radius:8px; background:#0b1520; cursor:pointer; user-select:none; font-weight:700; font-size:18px; color:#cbd5e1; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.5); }
  .cell.revealed { background:#071423; color:#9bf6ff; box-shadow:none; }
  .cell.mine { background:#4c1d95; color:#fff; }
  .heat { position:relative; }
  .heat::after { content:""; position:absolute; inset:0; border-radius:8px; pointer-events:none; }
  .legend { display:flex; gap:6px; align-items:center; margin-top:8px; color:#94a3b8; font-size:13px; }
  button { padding:8px 12px; border-radius:8px; border:0; cursor:pointer; background:#06b6d4; color:#021124; font-weight:700; }
  input[type=number] { padding:6px; border-radius:8px; border:0; width:100%; box-sizing:border-box; }
  .small { font-size:13px; color:#94a3b8; }
  .footer { margin-top:10px; color:#94a3b8; font-size:13px; }
</style>
</head>
<body>
  <div class="panel controls">
    <h1>مُحاكي Mines + Radar</h1>
    <label class="small">حجم الشبكة (n × n)</label>
    <input id="size" type="number" min="3" max="10" value="5" />
    <label class="small">عدد الألغام</label>
    <input id="mines" type="number" min="1" max="24" value="6" />
    <div style="display:flex;gap:8px">
      <button id="newBtn">توليد جديد</button>
      <button id="scanBtn">Scan Radar</button>
      <button id="autoBtn">كشف عشوائي</button>
    </div>
    <label class="small">محاكاة Monte Carlo (عدد العينات)</label>
    <input id="sims" type="number" min="100" max="20000" value="3000" />
    <div class="legend"><div style="width:16px;height:8px;background:linear-gradient(90deg,#06b6d4,#fde047,#ef4444);border-radius:4px"></div><div>أزرق=آمن ، أحمر=محتمل لغم</div></div>
    <div class="footer">ملاحظة: هذا برنامج تعليمي لتجربة الاستراتيجيات محلياً فقط. لا يساعد على اختراق أو غش أي موقع حقيقي.</div>
  </div>

  <div class="panel" style="padding:12px;">
    <div id="boardWrap"></div>
    <div id="status" class="small" style="margin-top:8px"></div>
  </div>

<script>
(function(){
  const boardWrap = document.getElementById('boardWrap');
  const newBtn = document.getElementById('newBtn');
  const scanBtn = document.getElementById('scanBtn');
  const autoBtn = document.getElementById('autoBtn');
  const sizeInput = document.getElementById('size');
  const minesInput = document.getElementById('mines');
  const simsInput = document.getElementById('sims');
  const status = document.getElementById('status');

  let N = parseInt(sizeInput.value);
  let M = parseInt(minesInput.value);
  let board = []; // 0 empty, 1 mine
  let revealed = []; // boolean
  let lastProb = null;

  function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

  function newBoard(){
    N = Math.max(3, Math.min(10, parseInt(sizeInput.value)||5));
    M = Math.max(1, Math.min(N*N-1, parseInt(minesInput.value)||6));
    board = Array(N*N).fill(0);
    revealed = Array(N*N).fill(false);
    // place M mines randomly
    let idxs = [...Array(N*N).keys()];
    // shuffle
    for (let i=idxs.length-1;i>0;i--){ let j = Math.floor(Math.random()*(i+1)); [idxs[i],idxs[j]]=[idxs[j],idxs[i]]; }
    for (let i=0;i<M;i++){ board[idxs[i]] = 1; }
    lastProb = null;
    render();
    status.textContent = لوحة ${N}×${N}، ألغام = ${M}. الخانات المكشوفة: 0;
  }

  function render(prob=null){
    boardWrap.innerHTML = '';
    boardWrap.style.width = ${N*(56+6)}px;
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.style.gridTemplateColumns = repeat(${N},56px);
    for (let i=0;i<N*N;i++){
      const c = document.createElement('div');
      c.className = 'cell';
      if (revealed[i]) c.classList.add('revealed');
      c.dataset.idx = i;
      if (revealed[i]){
        if (board[i]===1){ c.textContent='💣'; c.classList.add('mine'); }
        else c.textContent='✔';
      } else {
        c.textContent='';
      }
      // heat overlay
      const wrap = document.createElement('div');
      wrap.style.position='relative';
      wrap.className='heat';
      if (prob && prob[i] !== undefined){
        const p = prob[i]; // 0..1
        // map p to color gradient: blue (safe) to yellow to red
        // we'll set overlay with rgba
        // compute color roughly
        const r = Math.round(255 * Math.min(1, p*2));
        const g = Math.round(239 - 120 * Math.min(1, p*1.5));
        const b = Math.round(210 - 210 * Math.min(1, p));
        wrap.style.boxShadow = inset 0 0 0 2000px rgba(${r},${g},${b},${0.45*p});
      }
      c.style.margin='0';
      c.style.position='relative';
      c.addEventListener('click', onCellClick);
      wrap.appendChild(c);
      grid.appendChild(wrap);
    }
    boardWrap.appendChild(grid);
  }

  function onCellClick(e){
    const idx = parseInt(e.currentTarget.dataset.idx);
    if (revealed[idx]) return;
    revealed[idx] = true;
    render(lastProb);
    const cnt = revealed.filter(Boolean).length;
    status.textContent = الخانات المكشوفة: ${cnt};
    if (board[idx]===1){
      status.textContent += ' — انفجار! 💥 خسرت الجولة.';
      // reveal all mines
      for (let i=0;i<board.length;i++) if (board[i]===1) revealed[i]=true;
      render();
    } else {
      // continue
    }
  }

  function monteCarlo(samples){
    // For each simulation: randomly place M mines among unrevealed cells (excluding already-revealed safe ones)
    const totalCells = N*N;
    const fixedSafe = [];
    for (let i=0;i<totalCells;i++){
      if (revealed[i] && board[i]===0) fixedSafe.push(i);
      if (revealed[i] && board[i]===1){
        // already exploded — return deterministic: mines are known
        const prob = Array(totalCells).fill(0);
        for (let j=0;j<totalCells;j++) if (board[j]===1) prob[j]=1;
        return prob;
      }
    }
    const unavailable = new Set(fixedSafe); // cannot place mines here
    const freeIdx = [];
    for (let i=0;i<totalCells;i++) if (!unavailable.has(i)) freeIdx.push(i);

    const freeCount = freeIdx.length;
    const neededM = M; // stake-style: mines are global; we just must avoid fixedSafe
    if (neededM > freeCount){
      // impossible placement (shouldn't happen normally)
      return null;
    }

    const counts = Array(totalCells).fill(0);
    for (let s=0;s<samples;s++){
      // choose neededM indices from freeIdx uniformly
      // use Fisher-Yates partial shuffle
      const copy = freeIdx.slice();
      for (let k=0;k<neededM;k++){
        const j = Math.floor(Math.random()*(copy.length-k)) + k;
        [copy[k], copy[j]] = [copy[j], copy[k]];
        counts[copy[k]]++;
      }
    }
    const probs = counts.map(c => c / samples);
    // cells that are fixedSafe => prob 0 ; revealed mine => prob 1
    for (let i=0;i<totalCells;i++){
      if (revealed[i] && board[i]===0) probs[i] = 0;
      if (board[i]===1 && revealed[i]) probs[i] = 1;
    }
    return probs;
  }

  newBtn.addEventListener('click', ()=> newBoard());
  scanBtn.addEventListener('click', async ()=>{
    const sims = Math.max(100, Math.min(20000, parseInt(simsInput.value)||2000));
    status.textContent = تشغيل محاكاة ${sims} عينة...;
    // allow UI to update
    await new Promise(r => setTimeout(r,10));
    const probs = monteCarlo(sims);
    if (!probs){ status.textContent = 'خطأ في المحاكاة'; return; }
    lastProb = probs;
    render(probs);
    // show top 3 most risky tiles
    const arr = probs.map((p,i)=>({i,p})).filter(x=>!revealed[x.i]).sort((a,b)=>b.p-a.p);
    const top = arr.slice(0,3).map(x=>#${x.i+1}: ${(x.p*100).toFixed(1)}%).join(' ، ');
    status.textContent = احتمالية أعلى: ${top};
  });

  autoBtn.addEventListener('click', ()=>{
    // reveal a tile with minimal estimated risk (use lastProb if exists, else uniform)
    let probs = lastProb;
    if (!probs){
      // uniform for unrevealed: remaining mines / remaining cells
      const remainingM = M - board.reduce((s, val, i)=> s + (revealed[i] && val===1 ? 1 : 0), 0);
      const unrevealed = revealed.map((r,i)=>!r?1:0).reduce((a,b)=>a+b,0);
      const uniform = remainingM / Math.max(1,unrevealed);
      probs = Array(N*N).fill(uniform);
      for (let i=0;i<N*N;i++) if (revealed[i]) probs[i]=1; // mark as not choosable
    }
    let bestIdx = -1, bestP = 2;
    for (let i=0;i<N*N;i++){
      if (revealed[i]) continue;
      if (probs[i] < bestP){ bestP = probs[i]; bestIdx = i; }
    }
    if (bestIdx>=0) {
      // simulate click on bestIdx
      revealed[bestIdx]=true;
      render(lastProb);
      if (board[bestIdx]===1){
        for (let i=0;i<board.length;i++) if (board[i]===1) revealed[i]=true;
        render();
        status.textContent = 'كشف آلي: انفجار! خسرت الجولة.';
      } else {
        const cnt = revealed.filter(Boolean).length;
        status.textContent = كشف آلي: خانة آمنة. المكشوفة: ${cnt};
      }
    } else {
      status.textContent = 'لا توجد خانات للكشف.';
    }
  });

  // initialize
  newBoard();
})();
</script>
</body>
</html>
